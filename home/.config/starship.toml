"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000
scan_timeout    = 30
add_newline     = true

format = """
$directory\
$git_branch\
$git_status\
$fill\
$time\
$battery\
$status\
$line_break\
$character"""

[directory]
style             = "bold #fe8019"
read_only         = " 󰌾"
truncation_length = 3
truncate_to_repo  = true

[fill]
symbol = ' '

[git_branch]
symbol = " "
style  = 'bold green'

[git_status]
format     = '([$stashed$staged$modified$untracked$conflicted$ahead_behind]($style) )'
stashed    = '[*$count ](bold purple)'
staged     = '[+$count ](bold green)'
modified   = '[!$count ](bold yellow)'
untracked  = '[?$count ](bold blue)'
conflicted = '[x$count ](bold red)'

[time]
disabled    = false
format      = '[$time]($style) '
time_format = '%H:%M:%S'
style       = 'bold #a89984'

[battery]
format = '[$symbol$percentage]($style) '

[[battery.display]]
threshold = 25
style     = 'bold red'

[[battery.display]]
threshold = 50
style     = 'bold yellow'

[status]
disabled = false
symbol   = '✖ '
format   = '[$symbol$status]($style) '
style    = 'bold red'

[character]
success_symbol = '[❯](bold green)'
error_symbol   = '[❯](bold red)'

# Kill-switches — every module not in root `format` is disabled to prevent
# reactivation from preset merges, $all defaults, or new releases.
