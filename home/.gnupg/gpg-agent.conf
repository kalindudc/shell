# GPG Agent Configuration
# Manages passphrase caching for GPG key operations (git commit signing, encryption, etc.)

# Cache settings - keeps passphrases in memory to avoid repeated prompts
default-cache-ttl 259200       # Cache for 3 days (in seconds)
max-cache-ttl 259200           # Maximum cache time

# Pinentry program - graphical dialog for entering passphrases
# Use KDE's Qt-based pinentry for seamless KWallet integration on KDE Plasma
# On other systems, fallback to pinentry-gnome3, pinentry-gtk, or pinentry-curses
pinentry-program /usr/bin/pinentry-qt

# SSH support - allows gpg-agent to act as ssh-agent
# Enables using GPG keys for SSH authentication (optional)
enable-ssh-support
